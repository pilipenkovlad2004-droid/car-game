<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Neon Rush</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
* {
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
}

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: system-ui, -apple-system, sans-serif;
    background:
        radial-gradient(circle at top, #182848 0%, #0f1020 45%, #070b14 100%);
    color: #fff;
}

#game {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
}

/* Фон */
#bg {
    position: absolute;
    inset: 0;
    background:
        radial-gradient(circle at 20% 20%, rgba(0,255,255,.15), transparent 20%),
        radial-gradient(circle at 80% 15%, rgba(255,0,128,.15), transparent 20%),
        linear-gradient(to bottom, rgba(255,255,255,.03), transparent 30%);
}

/* Дорога */
#road {
    position: absolute;
    left: 14%;
    width: 72%;
    height: 100%;
    overflow: hidden;
    background: linear-gradient(180deg, #303030, #1c1c1c);
    border-left: 5px solid rgba(255,255,255,.8);
    border-right: 5px solid rgba(255,255,255,.8);
    box-shadow:
        inset 0 0 80px rgba(0,0,0,.85),
        0 0 40px rgba(0,255,255,.08);
}

#road::before,
#road::after {
    content: "";
    position: absolute;
    top: -100%;
    width: 8px;
    height: 200%;
    background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.95) 0 34px,
        transparent 34px 76px
    );
    animation: roadMove .55s linear infinite;
}

#road::before {
    left: 33.333%;
    transform: translateX(-50%);
}

#road::after {
    left: 66.666%;
    transform: translateX(-50%);
}

@keyframes roadMove {
    from { top: -100%; }
    to { top: 0; }
}

/* Машины */
.car, .obstacle {
    position: absolute;
    width: 64px;
    height: 112px;
    transform: translateX(-50%);
    border-radius: 16px;
}

.car {
    bottom: 24px;
    left: 50%;
    background: linear-gradient(180deg, #00e5ff, #006064);
    box-shadow:
        0 18px 30px rgba(0,0,0,.55),
        0 0 22px rgba(0,229,255,.28),
        inset 0 0 10px rgba(255,255,255,.18);
    transition: left .14s ease;
}

.obstacle {
    top: -140px;
    background: linear-gradient(180deg, #ff6d00, #c62828);
    box-shadow:
        0 14px 26px rgba(0,0,0,.45),
        0 0 18px rgba(255,109,0,.15),
        inset 0 0 10px rgba(255,255,255,.15);
}

.car::before, .obstacle::before {
    content: "";
    position: absolute;
    left: 14px;
    right: 14px;
    top: 14px;
    height: 28px;
    border-radius: 10px;
    background: linear-gradient(180deg, #bbdefb, #64b5f6);
}

.car::after, .obstacle::after {
    content: "";
    position: absolute;
    left: 8px;
    right: 8px;
    bottom: 12px;
    height: 10px;
    border-radius: 999px;
    background: rgba(255,255,255,.16);
}

/* HUD */
#hud {
    position: absolute;
    top: 14px;
    left: 14px;
    z-index: 5;
    padding: 12px 14px;
    border-radius: 16px;
    background: rgba(0,0,0,.28);
    backdrop-filter: blur(8px);
    box-shadow: 0 6px 20px rgba(0,0,0,.25);
    font-size: 16px;
    line-height: 1.5;
}

#speedMeter {
    margin-top: 6px;
    font-size: 13px;
    opacity: .85;
}

/* Меню */
#menu {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 18px;
    background: linear-gradient(180deg, rgba(2,6,23,.35), rgba(2,6,23,.88));
    backdrop-filter: blur(8px);
}

#menu h1 {
    margin: 0;
    font-size: 38px;
    letter-spacing: 1px;
    text-shadow: 0 0 20px rgba(0,229,255,.35);
}

#menu p {
    margin: 0;
    opacity: .8;
    font-size: 15px;
}

button {
    border: none;
    padding: 16px 42px;
    border-radius: 999px;
    font-size: 20px;
    font-weight: 700;
    color: #001018;
    background: linear-gradient(180deg, #00e5ff, #00b8d4);
    box-shadow:
        0 12px 25px rgba(0,0,0,.4),
        0 0 18px rgba(0,229,255,.28);
}

/* Эффект удара */
.flash {
    animation: flash .25s ease 2;
}

@keyframes flash {
    0% { filter: brightness(1); }
    50% { filter: brightness(2.1); }
    100% { filter: brightness(1); }
}
</style>
</head>
<body>
<div id="game">
    <div id="bg"></div>
    <div id="road"></div>
    <div id="car" class="car"></div>

    <div id="hud">
        Очки: <span id="score">0</span><br>
        Рекорд: <span id="best">0</span>
        <div id="speedMeter">Скорость: <span id="speedText">1.8</span></div>
    </div>

    <div id="menu">
        <h1>NEON RUSH</h1>
        <p>Нажимай слева/справа, чтобы менять полосу</p>
        <button id="start">СТАРТ</button>
    </div>
</div>

<script>
const road = document.getElementById("road");
const car = document.getElementById("car");
const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");
const speedText = document.getElementById("speedText");
const menu = document.getElementById("menu");
const startBtn = document.getElementById("start");

const lanes = [26, 50, 74];
let currentLane = 1;
let speed = 1.8;
let score = 0;
let playing = false;
let obstacles = [];
let spawnTimer = 0;
let lastTime = 0;

bestEl.textContent = localStorage.getItem("best-score") || 0;
updateCarPosition();

function updateCarPosition() {
    car.style.left = lanes[currentLane] + "%";
}

document.addEventListener("pointerdown", e => {
    if (!playing) return;

    if (e.clientX < window.innerWidth / 2) {
        if (currentLane > 0) currentLane--;
    } else {
        if (currentLane < lanes.length - 1) currentLane++;
    }

    updateCarPosition();
});

function spawnObstacle() {
    const o = document.createElement("div");
    o.className = "obstacle";

    const lane = Math.floor(Math.random() * lanes.length);
    o.dataset.lane = lane;
    o.style.left = lanes[lane] + "%";
    o.style.top = "-130px";

    road.appendChild(o);
    obstacles.push(o);
}

function hit(a, b) {
    const r1 = a.getBoundingClientRect();
    const r2 = b.getBoundingClientRect();

    return !(
        r1.right < r2.left ||
        r1.left > r2.right ||
        r1.bottom < r2.top ||
        r1.top > r2.bottom
    );
}

function loop(timestamp) {
    if (!playing) return;

    const delta = timestamp - lastTime;
    lastTime = timestamp;

    score += Math.floor(delta * 0.08);
    scoreEl.textContent = score;

    if (score > 0 && score % 500 < 10 && speed < 5.5) {
        speed += 0.002 * delta;
    }

    speedText.textContent = speed.toFixed(1);

    spawnTimer += delta;
    const spawnDelay = Math.max(500, 1100 - speed * 120);

    if (spawnTimer >= spawnDelay) {
        spawnObstacle();
        spawnTimer = 0;
    }

    for (let i = obstacles.length - 1; i >= 0; i--) {
        const o = obstacles[i];
        o.style.top = (o.offsetTop + speed * (delta / 10)) + "px";

        if (o.offsetTop > window.innerHeight) {
            o.remove();
            obstacles.splice(i, 1);
            continue;
        }

        if (hit(car, o)) {
            gameOver();
            return;
        }
    }

    requestAnimationFrame(loop);
}

function startGame() {
    score = 0;
    speed = 1.8;
    spawnTimer = 0;
    lastTime = performance.now();
    currentLane = 1;
    updateCarPosition();

    obstacles.forEach(o => o.remove());
    obstacles = [];

    scoreEl.textContent = "0";
    speedText.textContent = speed.toFixed(1);
    menu.style.display = "none";
    playing = true;

    requestAnimationFrame(loop);
}

function gameOver() {
    playing = false;
    car.classList.add("flash");
    setTimeout(() => car.classList.remove("flash"), 400);

    const best = Math.max(score, Number(bestEl.textContent));
    localStorage.setItem("best-score", best);
    bestEl.textContent = best;

    menu.style.display = "flex";
}

startBtn.addEventListener("click", startGame);
</script>
</body>
</html>
